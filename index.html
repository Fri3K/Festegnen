<style>
:root{
  --bg:#fff;--bg2:#f8f8f8;--bg3:#f5f5f5;--border:#ddd;--border2:#ccc;
  --text:#222;--text2:#555;--text3:#777;
  --drive-bg:#f0f6ff;--drive-border:#c5d9f5;--drive-text:#1a56a0;
  --conflict-bg:#FEF3E2;--conflict-border:#F5A623;--conflict-text:#BA7517;
  --editor-row-border:#eee;--conflict-row-bg:rgba(186,115,23,0.07);
  --popup-bg:#fff;--popup-border:#ccc;
}
[data-theme="dark"]{
  --bg:#121212;--bg2:#1e1e1e;--bg3:#2a2a2a;--border:#333;--border2:#444;
  --text:#e8e8e8;--text2:#aaa;--text3:#777;
  --drive-bg:#1a2436;--drive-border:#2a4060;--drive-text:#7ab3e0;
  --conflict-bg:#2a1e08;--conflict-border:#7a5010;--conflict-text:#f0a030;
  --editor-row-border:#2a2a2a;--conflict-row-bg:rgba(240,160,48,0.08);
  --popup-bg:#1e1e1e;--popup-border:#3a3a3a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans,system-ui,sans-serif);background:var(--bg);color:var(--text);transition:background .2s,color .2s;}
.wrap{padding:1rem 0;}
.day-tabs{display:flex;gap:8px;margin-bottom:1rem;}
.day-tab{padding:7px 18px;border:0.5px solid var(--border2);border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);background:var(--bg);}
.day-tab.active{background:#185FA5;color:#E6F1FB;border-color:#185FA5;}
.top-row{display:flex;gap:12px;align-items:center;margin-bottom:1rem;flex-wrap:wrap;}
.person-filters{display:flex;flex-wrap:wrap;gap:6px;flex:1;}
.person-btn{padding:4px 12px;border-radius:20px;border:1.5px solid var(--border2);cursor:pointer;font-size:12px;background:var(--bg);color:var(--text2);}
.person-btn.on{color:#fff;}
.edit-toggle{padding:6px 14px;border-radius:8px;border:0.5px solid var(--border2);cursor:pointer;font-size:12px;font-weight:500;background:var(--bg3);color:var(--text2);white-space:nowrap;}
.edit-toggle.active{background:#185FA5;color:#fff;border-color:#185FA5;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:.5rem;font-size:11px;color:var(--text3);}
.leg-item{display:flex;align-items:center;gap:4px;}
.leg-dot{width:9px;height:9px;border-radius:2px;}
.tl-hint{font-size:11px;color:var(--text3);margin-bottom:.5rem;}
.conflict-banner{margin-bottom:.75rem;background:var(--conflict-bg);border:0.5px solid var(--conflict-border);border-radius:8px;padding:.6rem .85rem;display:none;}
.conflict-banner h4{font-size:12px;font-weight:500;color:var(--conflict-text);margin-bottom:.35rem;}
.conflict-item{font-size:11px;color:var(--conflict-text);padding:2px 0;display:flex;align-items:flex-start;gap:6px;}
.conflict-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:2px;}
.tl-outer{overflow-x:auto;}
.editor{margin-top:1.25rem;border:0.5px solid var(--border);border-radius:10px;overflow:hidden;}
.editor-header{padding:.75rem 1rem;background:var(--bg2);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.editor-header h3{font-size:13px;font-weight:500;color:var(--text);}
.editor-stage-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.est{padding:4px 10px;border-radius:8px;border:0.5px solid var(--border2);cursor:pointer;font-size:11px;font-weight:500;background:var(--bg);color:var(--text2);}
.est.active{color:#fff;}
.editor-body{padding:.75rem 1rem;max-height:340px;overflow-y:auto;background:var(--bg);}
.artist-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--editor-row-border);}
.artist-row:last-child{border-bottom:none;}
.artist-row.conflict-row{background:var(--conflict-row-bg);border-radius:4px;padding-left:4px;}
.conflict-icon{font-size:12px;flex-shrink:0;}
.artist-name{font-size:12px;color:var(--text);flex:1;min-width:0;}
.artist-time{font-size:11px;color:var(--text3);white-space:nowrap;margin-right:2px;}
.person-check{width:20px;height:20px;border-radius:50%;border:1.5px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;transition:background .12s;position:relative;}
.person-check.checked{color:#fff;}
.person-check.conflict-check::after{content:'';position:absolute;top:-3px;right:-3px;width:7px;height:7px;border-radius:50%;background:#E24B4A;border:1px solid var(--bg);}
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:center;justify-content:center;}
.popup{background:var(--popup-bg);border-radius:10px;border:0.5px solid var(--popup-border);padding:1.25rem;width:340px;max-width:92vw;}
.popup-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px;}
.popup-sub{font-size:11px;color:var(--text3);margin-bottom:.75rem;}
.popup-conflict{font-size:11px;color:var(--conflict-text);background:var(--conflict-bg);border-radius:8px;padding:.4rem .6rem;margin-bottom:.85rem;display:none;}
.popup-people{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem;}
.popup-person{padding:5px 12px;border-radius:20px;border:1.5px solid;cursor:pointer;font-size:12px;font-weight:500;position:relative;}
.popup-person.checked{color:#fff;}
.popup-person.unchecked{background:transparent;}
.popup-person.conflict-person::after{content:'⚠';position:absolute;top:-6px;right:-4px;font-size:10px;}
.popup-close{width:100%;padding:7px;border-radius:8px;border:0.5px solid var(--border2);background:var(--bg3);cursor:pointer;font-size:13px;color:var(--text);}
.popup-title-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px;}
.popup-link{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;border:1px solid #1DB954;color:#1DB954;background:rgba(29,185,84,0.1);font-size:11px;font-weight:500;text-decoration:none;white-space:nowrap;flex-shrink:0;}
.popup-link:hover{background:#1DB954;color:#fff;}
.popup-link.web-link{border-color:#185FA5;color:#185FA5;background:rgba(24,95,165,0.1);}
.popup-link.web-link:hover{background:#185FA5;color:#fff;}

/* PDF + dark toggle knapper */
#pdfBtn{padding:6px 14px;border-radius:8px;border:0.5px solid #D85A30;background:#D85A30;color:#fff;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;display:flex;align-items:center;gap:5px;}
#pdfBtn:hover{background:#c04a20;}
#pdfBtn:disabled{opacity:0.6;cursor:wait;}
#darkBtn{padding:6px 10px;border-radius:8px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:14px;line-height:1;flex-shrink:0;}
#darkBtn:hover{background:var(--border);}

/* Drive status bar */
#driveBar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--drive-bg);border:0.5px solid var(--drive-border);border-radius:8px;margin-bottom:.75rem;font-size:11px;color:var(--drive-text);flex-wrap:wrap;}
#driveBar button{padding:3px 10px;border-radius:6px;border:0.5px solid #185FA5;background:#185FA5;color:#fff;cursor:pointer;font-size:11px;font-weight:500;}

#driveStatus{flex:1;min-width:120px;}
.dot-saving{display:inline-block;width:7px;height:7px;border-radius:50%;background:#f0a500;margin-right:4px;animation:pulse .8s infinite;}
.dot-saved{display:inline-block;width:7px;height:7px;border-radius:50%;background:#1a9e5c;margin-right:4px;}
.dot-idle{display:inline-block;width:7px;height:7px;border-radius:50%;background:#aaa;margin-right:4px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

<script>
// ===================== GITHUB GEMNING =====================
const GH_REPO='Fri3K/Festegnen';
const GH_FILE='festegnen_data.json';
const GH_API=`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;
let saveTimeout=null, fileSha=null;
let GH_TOKEN=localStorage.getItem('gh_token')||null;

function setDriveStatus(html,showSave,showLogin){
  const s=document.getElementById('driveStatus');
  const sb=document.getElementById('driveSaveBtn');
  if(s)s.innerHTML=html;
  if(sb)sb.style.display=showSave?'':'none';
}

function ghHeaders(){
  return {
    'Authorization':'Bearer '+GH_TOKEN,
    'Content-Type':'application/json',
    'Accept':'application/vnd.github+json',
  };
}

function promptToken(){
  const t=prompt('Indtast dit GitHub Personal Access Token:');
  if(t&&t.trim()){
    GH_TOKEN=t.trim();
    localStorage.setItem('gh_token',GH_TOKEN);
    ghLoad();
  }
}

async function ghLoad(){
  if(!GH_TOKEN){
    setDriveStatus('<span class="dot-idle"></span>Token mangler',true,false);
    const sb=document.getElementById('driveSaveBtn');
    if(sb){sb.textContent='Indtast token';sb.onclick=promptToken;sb.style.display='';}
    return;
  }
  setDriveStatus('<span class="dot-saving"></span>Henter data…',false,false);
  try{
    const r=await fetch(GH_API,{headers:ghHeaders()});
    if(r.status===401){
      localStorage.removeItem('gh_token');
      GH_TOKEN=null;
      setDriveStatus('<span class="dot-idle"></span>Token ugyldigt',true,false);
      const sb=document.getElementById('driveSaveBtn');
      if(sb){sb.textContent='Indtast token';sb.onclick=promptToken;sb.style.display='';}
      return;
    }
    if(r.status===404){
      setDriveStatus('<span class="dot-saved"></span>Klar · ingen tidligere data',true,false);
      const sb=document.getElementById('driveSaveBtn');
      if(sb){sb.textContent='Gem nu';sb.onclick=ghSave;}
      return;
    }
    const json=await r.json();
    fileSha=json.sha;
    const decoded=JSON.parse(atob(json.content.replace(/[\n\r]/g,'')));
    ['fri','sat'].forEach(day=>{
      if(!decoded[day])return;
      decoded[day].forEach((s,i)=>{if(DATA[day][i])DATA[day][i].who=s.who||[];});
    });
    refreshAll();
    setDriveStatus('<span class="dot-saved"></span>Data indlæst · gemmer automatisk',true,false);
    const sb=document.getElementById('driveSaveBtn');
    if(sb){sb.textContent='Gem nu';sb.onclick=ghSave;}
  }catch(e){
    setDriveStatus('<span class="dot-idle"></span>Fejl: '+e.message,true,false);
  }
}

async function ghSave(){
  setDriveStatus('<span class="dot-saving"></span>Gemmer…',true,false);
  try{
    const payload=JSON.stringify(['fri','sat'].reduce((acc,day)=>{
      acc[day]=DATA[day].map(ev=>({who:ev.who}));return acc;
    },{}));
    const body={
      message:'Opdater festegnen valg',
      content:btoa(unescape(encodeURIComponent(payload))),
    };
    if(fileSha)body.sha=fileSha;
    const r=await fetch(GH_API,{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
    const json=await r.json();
    console.log('GitHub svar:', r.status, JSON.stringify(json).substring(0,300));
    if(r.ok&&json.content&&json.content.sha){
      fileSha=json.content.sha;
      const t=new Date().toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'});
      setDriveStatus('<span class="dot-saved"></span>Gemt '+t+' ✓',true,false);
    }else{
      const msg=(json.message||JSON.stringify(json)).substring(0,80);
      setDriveStatus('<span class="dot-idle"></span>Fejl '+r.status+': '+msg,true,false);
    }
  }catch(e){
    setDriveStatus('<span class="dot-idle"></span>Fejl: '+e.message,true,false);
  }
}

function scheduleSave(){
  setDriveStatus('<span class="dot-saving"></span>Ikke-gemte ændringer…',true,false);
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(ghSave,2000);
}

function stageX(si){
  // Pause er placeret mellem scene 1 og 2, så scene 2+3 forskydes
  const base=TIME_W+GAP+si*(STAGE_W+GAP);
  return si>=2?base+PAUSE_W+GAP:base;
}
function pauseX(){return TIME_W+GAP+2*(STAGE_W+GAP);}
function stageCX(si){return stageX(si)+STAGE_W/2;}
function pauseCX(){return pauseX()+PAUSE_W/2;}
function totalW(){return stageX(3)+STAGE_W+4;}
function tY(t,minT){return HDR_H+(t-minT)*60*PPM;}
function fmtTime(t){const h=Math.floor(t);const m=Math.round((t%1)*60);return h.toString().padStart(2,'0')+':'+(m).toString().padStart(2,'0');}

let currentDay='fri', activePersons=new Set(PEOPLE), editorOpen=false, editorStage='live';
let hitBoxes=[], popupEventIndex=null;

function getConflicts(day){
  const data=DATA[day];
  const conflicts={};
  PEOPLE.forEach(p=>{
    const shows=data.filter(e=>e.who.includes(p)).sort((a,b)=>a.start-b.start);
    for(let i=0;i<shows.length;i++){
      for(let j=i+1;j<shows.length;j++){
        if(shows[j].start<shows[i].end-0.01){
          if(!conflicts[p])conflicts[p]=[];
          conflicts[p].push({a:shows[i],b:shows[j]});
        }
      }
    }
  });
  return conflicts;
}
function getConflictIndices(day){
  const data=DATA[day];
  const conflicts=getConflicts(day);
  const conflictPersons={};
  Object.entries(conflicts).forEach(([person,pairs])=>{
    pairs.forEach(({a,b})=>{
      const ia=data.indexOf(a),ib=data.indexOf(b);
      if(!conflictPersons[ia])conflictPersons[ia]=new Set();
      if(!conflictPersons[ib])conflictPersons[ib]=new Set();
      conflictPersons[ia].add(person);
      conflictPersons[ib].add(person);
    });
  });
  return conflictPersons;
}

function updateConflictBanner(){
  const conflicts=getConflicts(currentDay);
  const banner=document.getElementById('conflictBanner');
  const list=document.getElementById('conflictList');
  const entries=Object.entries(conflicts).filter(([,pairs])=>pairs.length>0);
  if(!entries.length){banner.style.display='none';return;}
  banner.style.display='block';
  list.innerHTML='';
  entries.forEach(([person,pairs])=>{
    const idx=PEOPLE.indexOf(person);
    pairs.forEach(({a,b})=>{
      const div=document.createElement('div');
      div.className='conflict-item';
      div.innerHTML=`<span class="conflict-dot" style="background:${COLORS[idx]}"></span><span><strong>${person}:</strong> ${a.name} (${fmtTime(a.start)}–${fmtTime(a.end)}) og ${b.name} (${fmtTime(b.start)}–${fmtTime(b.end)}) overlapper</span>`;
      list.appendChild(div);
    });
  });
}

function buildFilters(){
  const c=document.getElementById('pfilters');c.innerHTML='';
  PEOPLE.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='person-btn on';b.dataset.name=p;
    b.style.cssText=`background:${COLORS[i]};border-color:${COLORS[i]};color:#fff;`;
    b.textContent=p;b.onclick=()=>togglePerson(p);c.appendChild(b);
  });
}
function togglePerson(name){
  if(activePersons.has(name))activePersons.delete(name);else activePersons.add(name);
  document.querySelectorAll('.person-btn').forEach(b=>{
    if(b.dataset.name===name){
      const on=activePersons.has(name),idx=PEOPLE.indexOf(name);
      b.classList.toggle('on',on);
      b.style.background=on?COLORS[idx]:'#fff';
      b.style.borderColor=on?COLORS[idx]:'#ccc';
      b.style.color=on?'#fff':'#555';
    }
  });
  render();
}

function setDay(d){
  currentDay=d;
  document.querySelectorAll('.day-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&d==='fri')||(i===1&&d==='sat')));
  if(editorOpen){buildEditorTabs();}
  render();
}

function toggleEditor(){
  editorOpen=!editorOpen;
  document.getElementById('editorWrap').style.display=editorOpen?'block':'none';
  document.getElementById('editToggle').classList.toggle('active',editorOpen);
  if(editorOpen)buildEditorTabs();
}
function buildEditorTabs(){
  const tb=document.getElementById('stageTabs');tb.innerHTML='';
  STAGES.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='est'+(s===editorStage?' active':'');
    if(s===editorStage)b.style.cssText=`background:${STAGE_COLORS[s].hdr};border-color:${STAGE_COLORS[s].hdr};color:#fff;`;
    b.textContent=STAGE_LABELS[i];
    b.onclick=()=>{editorStage=s;buildEditorTabs();};
    tb.appendChild(b);
  });
  buildEditor();
}
function buildEditor(){
  const body=document.getElementById('editorBody');body.innerHTML='';
  const data=DATA[currentDay];
  const conflictPersons=getConflictIndices(currentDay);
  const events=data.filter(e=>e.stage===editorStage).sort((a,b)=>a.start-b.start);
  events.forEach(ev=>{
    const idx=data.indexOf(ev);
    const evConflicts=conflictPersons[idx]||new Set();
    const hasConflict=evConflicts.size>0;
    const row=document.createElement('div');
    row.className='artist-row'+(hasConflict?' conflict-row':'');
    if(hasConflict){
      const ic=document.createElement('span');ic.className='conflict-icon';ic.textContent='⚠';ic.style.color='#E24B4A';row.appendChild(ic);
    }
    const nm=document.createElement('div');nm.className='artist-name';nm.textContent=ev.name;
    const tm=document.createElement('div');tm.className='artist-time';
    tm.textContent=fmtTime(ev.start)+'–'+fmtTime(ev.end);
    row.appendChild(nm);row.appendChild(tm);
    PEOPLE.forEach((p,pi)=>{
      const checked=ev.who.includes(p);
      const isConflict=evConflicts.has(p);
      const btn=document.createElement('div');
      btn.className='person-check'+(checked?' checked':' unchecked')+(isConflict?' conflict-check':'');
      btn.title=p+(isConflict?' (konflikt!)':'');
      btn.style.cssText=`border-color:${COLORS[pi]};background:${checked?COLORS[pi]:'transparent'};color:${checked?'#fff':COLORS[pi]};`;
      btn.onclick=()=>{
        const has=ev.who.includes(p);
        if(has)ev.who=ev.who.filter(x=>x!==p);else ev.who.push(p);
        refreshAll();
        scheduleSave();
      };
      row.appendChild(btn);
    });
    body.appendChild(row);
  });
}

function getLinkForEvent(name){
  if(LINKS[name])return LINKS[name];
  // Fuzzy: find key der starter med eller indeholder kunstnernavnet
  for(const k of Object.keys(LINKS)){
    if(name.startsWith(k)||k.startsWith(name))return LINKS[k];
  }
  return null;
}

function isSpotifyLink(url){return url&&url.includes('spotify.com');}

    linkEl.style.display='none';
  }
  document.getElementById('popupSub').textContent=STAGE_LABELS[STAGES.indexOf(ev.stage)]+' · '+fmtTime(ev.start)+'–'+fmtTime(ev.end);
  const pc=document.getElementById('popupConflict');
  if(evConflicts.size>0){
    pc.style.display='block';

    const checked=ev.who.includes(p);

      openPopup(evIdx);

});

function buildSegments(person,data,minT,maxT){
  const shows=data.filter(e=>e.who.includes(person)).sort((a,b)=>a.start-b.start);
  const segs=[];let cur=minT;
  for(const s of shows){
    if(s.start>cur+0.04)segs.push({type:'pause',start:cur,end:s.start});
    segs.push({type:'show',start:s.start,end:s.end,stage:s.stage});
    cur=Math.max(cur,s.end);
  }
  if(cur<maxT)segs.push({type:'pause',start:cur,end:maxT});
  return segs;
}
function segCX(seg){return seg.type==='pause'?pauseCX():stageCX(STAGES.indexOf(seg.stage));}

function drawPersonPath(ctx,person,data,minT,maxT,color,offset,conflictTimes){
  const segs=buildSegments(person,data,minT,maxT);
  if(!segs.length)return;
  ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
  for(let i=0;i<segs.length;i++){
    const seg=segs[i];
    const x=segCX(seg)+offset;
    const y1=tY(seg.start,minT),y2=tY(seg.end,minT);
    ctx.globalAlpha=seg.type==='pause'?0.28:0.88;
    ctx.setLineDash(seg.type==='pause'?[4,3]:[]);
    ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x,y2);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
    if(i<segs.length-1){
      const next=segs[i+1],x2=segCX(next)+offset,cy=tY(seg.end,minT);
      if(Math.abs(x2-x)>2){
        ctx.globalAlpha=0.65;ctx.beginPath();ctx.moveTo(x,cy);ctx.lineTo(x2,cy);ctx.stroke();ctx.globalAlpha=1;
      }
    }
  }
  segs.filter(s=>s.type==='show').forEach(seg=>{
    const x=segCX(seg)+offset,y=tY(seg.start,minT);
    const isConflict=conflictTimes&&conflictTimes.some(ct=>Math.abs(ct-seg.start)<0.01||(seg.start<ct&&seg.end>ct+0.01));
    ctx.globalAlpha=1;
    if(isConflict){
      ctx.strokeStyle='#E24B4A';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='#E24B4A';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,1.8,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=color;ctx.lineWidth=2.5;
    } else {
      ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();
    }
  });
}

function wrapText(ctx,text,maxW){
  const words=text.split(' '),lines=[];let line='';
  for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;}
  if(line)lines.push(line);return lines;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function render(){
  const data=DATA[currentDay];
  const minT=currentDay==='fri'?14:11, maxT=24;
  const totalMins=(maxT-minT)*60;
  const canvasH=HDR_H+totalMins*PPM+8, canvasW=totalW();
  const dpr=window.devicePixelRatio||1;
  const cv=document.getElementById('cv');
  cv.width=canvasW*dpr;cv.height=canvasH*dpr;
  cv.style.width=canvasW+'px';cv.style.height=canvasH+'px';
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const bgColor=isDark?'#1a1a1a':'#ffffff';
  const gridColor=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  const textMuted=isDark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.4)';
  ctx.fillStyle=bgColor;ctx.fillRect(0,0,canvasW,canvasH);
  // Header: live, dj360, pause, viel, bodega
  const headerCols=[
    {x:stageX(0),w:STAGE_W,col:STAGE_COLORS.live,label:STAGE_LABELS[0]},
    {x:stageX(1),w:STAGE_W,col:STAGE_COLORS.dj360,label:STAGE_LABELS[1]},
    {x:pauseX(),w:PAUSE_W,col:STAGE_COLORS.pause,label:'Pause'},
    {x:stageX(2),w:STAGE_W,col:STAGE_COLORS.viel,label:STAGE_LABELS[2]},
    {x:stageX(3),w:STAGE_W,col:STAGE_COLORS.bodega,label:STAGE_LABELS[3]},
  ];
  headerCols.forEach(({x,w,col,label})=>{
    ctx.fillStyle=col.hdr;roundRect(ctx,x,0,w,HDR_H-4,5);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='500 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,x+w/2,HDR_H/2-2,w-6);
  });
  for(let h=minT;h<=maxT;h++){
    const y=tY(h,minT);
    ctx.strokeStyle=gridColor;ctx.lineWidth=0.5;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(TIME_W,y);ctx.lineTo(canvasW,y);ctx.stroke();
    ctx.fillStyle=textMuted;ctx.font='10px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(h<24?h+':00':'00:00',TIME_W-4,y);
  }
  const conflictPersons=getConflictIndices(currentDay);
  hitBoxes=[];
  const stageMap={};STAGES.forEach(s=>stageMap[s]=data.filter(e=>e.stage===s));
  STAGES.forEach((stage,si)=>{
    const x=stageX(si),col=STAGE_COLORS[stage];
    stageMap[stage].forEach(ev=>{
      const evIdx=data.indexOf(ev);
      const y=tY(ev.start,minT)+1;
      const h=Math.max((ev.end-ev.start)*60*PPM-2,14);
      const relevant=ev.who.filter(p=>activePersons.has(p));
      const dim=ev.who.length>0&&!relevant.length;
      const evConflicts=conflictPersons[evIdx]||new Set();
      const hasVisibleConflict=[...evConflicts].some(p=>activePersons.has(p));
      ctx.globalAlpha=dim?0.15:1;
      if(hasVisibleConflict&&!dim){
        ctx.fillStyle='#FCEBEB';roundRect(ctx,x,y,STAGE_W,h,4);ctx.fill();
        ctx.strokeStyle='#E24B4A';ctx.lineWidth=1.5;roundRect(ctx,x,y,STAGE_W,h,4);ctx.stroke();
        ctx.fillStyle='#E24B4A';roundRect(ctx,x,y,3,h,2);ctx.fill();
      } else {
        ctx.fillStyle=col.fill;roundRect(ctx,x,y,STAGE_W,h,4);ctx.fill();
        ctx.strokeStyle=col.stroke;ctx.lineWidth=0.5;roundRect(ctx,x,y,STAGE_W,h,4);ctx.stroke();
      }
      ctx.fillStyle=hasVisibleConflict&&!dim?'#E24B4A':col.text;
      ctx.globalAlpha=dim?0.15:0.3;
      ctx.font='9px sans-serif';ctx.textAlign='right';ctx.textBaseline='top';
      ctx.fillText('✎',x+STAGE_W-3,y+2);
      if(hasVisibleConflict&&!dim){
        ctx.globalAlpha=1;ctx.fillStyle='#E24B4A';
        ctx.font='bold 10px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
        ctx.fillText('⚠',x+5,y+2);
      }
      ctx.globalAlpha=dim?0.15:1;
      ctx.fillStyle=hasVisibleConflict&&!dim?'#A32D2D':col.text;
      ctx.font='500 9px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
      const lines=wrapText(ctx,ev.name,STAGE_W-18);
      const maxL=Math.floor((h-4)/11);
      const textX=hasVisibleConflict&&!dim?x+16:x+4;
      lines.slice(0,Math.max(1,maxL)).forEach((l,li)=>ctx.fillText(l,textX,y+3+li*11,STAGE_W-20));
      ctx.globalAlpha=1;
      hitBoxes.push({x,y,w:STAGE_W,h,idx:evIdx});
    });
  });
  ctx.fillStyle=isDark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.02)';
  ctx.fillRect(pauseX(),HDR_H,PAUSE_W,totalMins*PPM);
  const visiblePersons=PEOPLE.filter(p=>activePersons.has(p));
  const n=visiblePersons.length;
  const maxSpread=Math.min(20,STAGE_W*0.35);
  const conflicts=getConflicts(currentDay);
  visiblePersons.forEach((p,pi)=>{
    const idx=PEOPLE.indexOf(p);
    const offset=n<=1?0:(pi/(n-1)-0.5)*maxSpread*2;
    const personConflicts=conflicts[p]||[];
    const conflictTimes=personConflicts.flatMap(({a,b})=>[a.start,b.start]);
    drawPersonPath(ctx,p,data,minT,maxT,COLORS[idx],offset,conflictTimes);
  });
  updateConflictBanner();
}

function renderToOffscreenCanvas(day, scale, isDark){
  // Tegner tidslinjen på en separat off-screen canvas i vilkårlig opløsning
  const data=DATA[day];
  const minT=day==='fri'?14:11, maxT=24;
  const totalMins=(maxT-minT)*60;
  const canvasH=HDR_H+totalMins*PPM+8, canvasW=totalW();
  const visiblePersons=PEOPLE.filter(p=>activePersons.has(p));
  const legendH=visiblePersons.length>0?18:0;
  const oc=document.createElement('canvas');
  oc.width=canvasW*scale; oc.height=(canvasH+legendH)*scale;
  const ctx=oc.getContext('2d'); ctx.scale(scale,scale);
  const bgColor=isDark?'#1a1a1a':'#ffffff';
  ctx.fillStyle=bgColor; ctx.fillRect(0,0,canvasW,canvasH);
  const gridColor=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  const textMuted=isDark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.4)';
  const headerCols=[
    {x:stageX(0),w:STAGE_W,col:STAGE_COLORS.live,label:STAGE_LABELS[0]},
    {x:stageX(1),w:STAGE_W,col:STAGE_COLORS.dj360,label:STAGE_LABELS[1]},
    {x:pauseX(),w:PAUSE_W,col:STAGE_COLORS.pause,label:'Pause'},
    {x:stageX(2),w:STAGE_W,col:STAGE_COLORS.viel,label:STAGE_LABELS[2]},
    {x:stageX(3),w:STAGE_W,col:STAGE_COLORS.bodega,label:STAGE_LABELS[3]},
  ];
  headerCols.forEach(({x,w,col,label})=>{
    ctx.fillStyle=col.hdr; roundRect(ctx,x,0,w,HDR_H-4,5); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='500 10px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(label,x+w/2,HDR_H/2-2,w-6);
  });
  for(let h=minT;h<=maxT;h++){
    const y=tY(h,minT);
    ctx.strokeStyle=gridColor; ctx.lineWidth=0.5; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(TIME_W,y); ctx.lineTo(canvasW,y); ctx.stroke();
    ctx.fillStyle=textMuted; ctx.font='10px sans-serif'; ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText(h<24?h+':00':'00:00',TIME_W-4,y);
  }
  const conflictPersons=getConflictIndices(day);
  const stageMap={}; STAGES.forEach(s=>stageMap[s]=data.filter(e=>e.stage===s));
  STAGES.forEach((stage,si)=>{
    const x=stageX(si), col=stageCol(STAGE_COLORS[stage], isDark);
    stageMap[stage].forEach(ev=>{
      const evIdx=data.indexOf(ev);
      const y=tY(ev.start,minT)+1;
      const h=Math.max((ev.end-ev.start)*60*PPM-2,14);
      const relevant=ev.who.filter(p=>activePersons.has(p));
      const dim=ev.who.length>0&&!relevant.length;
      const evConflicts=conflictPersons[evIdx]||new Set();
      const hasVisibleConflict=[...evConflicts].some(p=>activePersons.has(p));
      ctx.globalAlpha=dim?0.15:1;
      if(hasVisibleConflict&&!dim){
        ctx.fillStyle=isDark?'#3a1010':'#FCEBEB'; roundRect(ctx,x,y,STAGE_W,h,4); ctx.fill();
        ctx.strokeStyle='#E24B4A'; ctx.lineWidth=1.5; roundRect(ctx,x,y,STAGE_W,h,4); ctx.stroke();
        ctx.fillStyle='#E24B4A'; roundRect(ctx,x,y,3,h,2); ctx.fill();
      } else {
        ctx.fillStyle=col.fill; roundRect(ctx,x,y,STAGE_W,h,4); ctx.fill();
        ctx.strokeStyle=col.stroke; ctx.lineWidth=0.5; roundRect(ctx,x,y,STAGE_W,h,4); ctx.stroke();
      }
      ctx.fillStyle=hasVisibleConflict&&!dim?'#E24B4A':col.text;
      ctx.globalAlpha=dim?0.15:0.3;
      ctx.font='9px sans-serif'; ctx.textAlign='right'; ctx.textBaseline='top';
      ctx.fillText('✎',x+STAGE_W-3,y+2);
      if(hasVisibleConflict&&!dim){
        ctx.globalAlpha=1; ctx.fillStyle='#E24B4A';
        ctx.font='bold 10px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText('⚠',x+5,y+2);
      }
      ctx.globalAlpha=dim?0.15:1;
      ctx.fillStyle=hasVisibleConflict&&!dim?(isDark?'#ff8080':'#A32D2D'):col.text;
      ctx.font='500 9px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top';
      const lines=wrapText(ctx,ev.name,STAGE_W-18);
      const maxL=Math.floor((h-4)/11);
      const textX=hasVisibleConflict&&!dim?x+16:x+4;
      lines.slice(0,Math.max(1,maxL)).forEach((l,li)=>ctx.fillText(l,textX,y+3+li*11,STAGE_W-20));
      ctx.globalAlpha=1;
    });
  });
  ctx.fillStyle=isDark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.02)';
  ctx.fillRect(pauseX(),HDR_H,PAUSE_W,totalMins*PPM);
  const n=visiblePersons.length;
  const maxSpread=Math.min(20,STAGE_W*0.35);
  const conflicts=getConflicts(day);
  visiblePersons.forEach((p,pi)=>{
    const idx=PEOPLE.indexOf(p);
    const offset=n<=1?0:(pi/(n-1)-0.5)*maxSpread*2;
    const personConflicts=conflicts[p]||[];
    const conflictTimes=personConflicts.flatMap(({a,b})=>[a.start,b.start]);
    drawPersonPath(ctx,p,data,minT,maxT,COLORS[idx],offset,conflictTimes);
  });

  // Navne-legende under tidslinjen
  if(visiblePersons.length>0){
    const legendY=canvasH-6;
    const dotR=4;
    ctx.font='500 9px sans-serif';
    ctx.textBaseline='middle';
    // Mål alle navne og fordel dem
    const items=visiblePersons.map(p=>({p,idx:PEOPLE.indexOf(p),w:ctx.measureText(p).width}));
    const itemW=dotR*2+4; // dot + gap
    const totalItemW=items.reduce((s,it)=>s+it.w+itemW+10,0)-10;
    let lx=Math.max(TIME_W,(canvasW-totalItemW)/2);
    items.forEach(({p,idx,w})=>{
      const color=COLORS[idx];
      ctx.fillStyle=color;
      ctx.beginPath();ctx.arc(lx+dotR,legendY,dotR,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=isDark?'rgba(255,255,255,0.85)':'rgba(0,0,0,0.75)';
      ctx.textAlign='left';
      ctx.fillText(p,lx+dotR*2+4,legendY);
      lx+=dotR*2+4+w+10;
    });
  }

  return {canvas:oc, logicalW:canvasW, logicalH:canvasH+legendH};
}

async function downloadPDF(){
  const btn=document.getElementById('pdfBtn');
  btn.disabled=true;
  btn.textContent='⏳ Genererer…';

  const {jsPDF}=window.jspdf;
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const days=['fri','sat'];
  const dayLabels={'fri':'Fredag 19. juni','sat':'Lørdag 20. juni'};
  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pageW=210, pageH=297, margin=10;
  const PDF_SCALE=4;

  for(let di=0;di<days.length;di++){
    const day=days[di];
    await new Promise(r=>setTimeout(r,20));

    const {canvas:oc, logicalW, logicalH}=renderToOffscreenCanvas(day, PDF_SCALE, isDark);
    const imgData=oc.toDataURL('image/png');

    if(di>0)pdf.addPage();

    // Sidens baggrund i mørkt tema
    if(isDark){
      pdf.setFillColor(26,26,26);
      pdf.rect(0,0,pageW,pageH,'F');
    }

    // Titel
    pdf.setFont('helvetica','bold');
    pdf.setFontSize(13);
    isDark ? pdf.setTextColor(122,179,224) : pdf.setTextColor(24,95,165);
    pdf.text('Festegnen 2026 – '+dayLabels[day], margin, margin+5);

    // Beregn skalering så tidslinjen passer på siden
    const maxImgW=pageW-margin*2;
    const maxImgH=pageH-margin*2-12;
    const scale=Math.min(maxImgW/logicalW, maxImgH/logicalH);
    const imgW=logicalW*scale, imgH=logicalH*scale;
    const imgX=margin+(maxImgW-imgW)/2;
    const imgY=margin+10;

    pdf.addImage(imgData,'PNG',imgX,imgY,imgW,imgH,undefined,'FAST');

    // Sidefod
    pdf.setFont('helvetica','normal');
    pdf.setFontSize(7);
    pdf.setTextColor(120,120,120);
    pdf.text('Genereret '+new Date().toLocaleDateString('da-DK'),margin,pageH-5);
    pdf.text('Side '+(di+1)+'/'+days.length,pageW-margin,pageH-5,'right');
  }

  pdf.save('Festegnen-2026-tidslinje.pdf');
  btn.disabled=false;
  btn.innerHTML='⬇ Download PDF';
}

buildFilters();

// Dark mode
let darkMode=localStorage.getItem('darkMode')==='1'||(localStorage.getItem('darkMode')===null&&window.matchMedia('(prefers-color-scheme: dark)').matches);
function applyTheme(){
  document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');
  document.getElementById('darkBtn').textContent=darkMode?'☀️':'🌙';
  render();
}
function toggleDark(){darkMode=!darkMode;localStorage.setItem('darkMode',darkMode?'1':'0');applyTheme();}
applyTheme();

render();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',e=>{
  if(localStorage.getItem('darkMode')===null){darkMode=e.matches;applyTheme();}
});
