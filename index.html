// ===================== GITHUB GEMNING =====================
const GH_REPO='Fri3K/Festegnen';
const GH_FILE='festegnen_data.json';
const GH_API=`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;
let saveTimeout=null, fileSha=null;
let GH_TOKEN=localStorage.getItem('gh_token')||null;

function setDriveStatus(html,showSave,showLogin){
  const s=document.getElementById('driveStatus');
  const sb=document.getElementById('driveSaveBtn');
  if(s)s.innerHTML=html;
  if(sb)sb.style.display=showSave?'':'none';
}

function ghHeaders(){
  return {
    'Authorization':'Bearer '+GH_TOKEN,
    'Content-Type':'application/json',
    'Accept':'application/vnd.github+json',
  };
}

function promptToken(){
  const t=prompt('Indtast dit GitHub Personal Access Token:');
  if(t&&t.trim()){
    GH_TOKEN=t.trim();
    localStorage.setItem('gh_token',GH_TOKEN);
    ghLoad();
  }
}

async function ghLoad(){
  if(!GH_TOKEN){
    setDriveStatus('<span class="dot-idle"></span>Token mangler',true,false);
    const sb=document.getElementById('driveSaveBtn');
    if(sb){sb.textContent='Indtast token';sb.onclick=promptToken;sb.style.display='';}
    return;
  }
  setDriveStatus('<span class="dot-saving"></span>Henter data…',false,false);
  try{
    const r=await fetch(GH_API,{headers:ghHeaders()});
    if(r.status===401){
      localStorage.removeItem('gh_token');
      GH_TOKEN=null;
      setDriveStatus('<span class="dot-idle"></span>Token ugyldigt',true,false);
      const sb=document.getElementById('driveSaveBtn');
      if(sb){sb.textContent='Indtast token';sb.onclick=promptToken;sb.style.display='';}
      return;
    }
    if(r.status===404){
      setDriveStatus('<span class="dot-saved"></span>Klar · ingen tidligere data',true,false);
      const sb=document.getElementById('driveSaveBtn');
      if(sb){sb.textContent='Gem nu';sb.onclick=ghSave;}
      return;
    }
    const json=await r.json();
    fileSha=json.sha;
    const decoded=JSON.parse(atob(json.content.replace(/[\n\r]/g,'')));
    ['fri','sat'].forEach(day=>{
      if(!decoded[day])return;
      decoded[day].forEach((s,i)=>{if(DATA[day][i])DATA[day][i].who=s.who||[];});
    });
    refreshAll();
    setDriveStatus('<span class="dot-saved"></span>Data indlæst · gemmer automatisk',true,false);
    const sb=document.getElementById('driveSaveBtn');
    if(sb){sb.textContent='Gem nu';sb.onclick=ghSave;}
  }catch(e){
    setDriveStatus('<span class="dot-idle"></span>Fejl: '+e.message,true,false);
  }
}

async function ghSave(){
  setDriveStatus('<span class="dot-saving"></span>Gemmer…',true,false);
  try{
    const payload=JSON.stringify(['fri','sat'].reduce((acc,day)=>{
      acc[day]=DATA[day].map(ev=>({who:ev.who}));return acc;
    },{}));
    const body={
      message:'Opdater festegnen valg',
      content:btoa(unescape(encodeURIComponent(payload))),
    };
    if(fileSha)body.sha=fileSha;
    const r=await fetch(GH_API,{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
    const json=await r.json();
    console.log('GitHub svar:', r.status, JSON.stringify(json).substring(0,300));
    if(r.ok&&json.content&&json.content.sha){
      fileSha=json.content.sha;
      const t=new Date().toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'});
      setDriveStatus('<span class="dot-saved"></span>Gemt '+t+' ✓',true,false);
    }else{
      const msg=(json.message||JSON.stringify(json)).substring(0,80);
      setDriveStatus('<span class="dot-idle"></span>Fejl '+r.status+': '+msg,true,false);
    }
  }catch(e){
    setDriveStatus('<span class="dot-idle"></span>Fejl: '+e.message,true,false);
  }
}

function scheduleSave(){
  setDriveStatus('<span class="dot-saving"></span>Ikke-gemte ændringer…',true,false);
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(ghSave,2000);
}

  const base=TIME_W+GAP+si*(STAGE_W+GAP);

function getConflicts(day){
  const data=DATA[day];
  const conflicts={};
  PEOPLE.forEach(p=>{
    const shows=data.filter(e=>e.who.includes(p)).sort((a,b)=>a.start-b.start);
    for(let i=0;i<shows.length;i++){
      for(let j=i+1;j<shows.length;j++){
        if(shows[j].start<shows[i].end-0.01){
          if(!conflicts[p])conflicts[p]=[];
          conflicts[p].push({a:shows[i],b:shows[j]});
        }
      }
    }
  });
  return conflicts;
}
function getConflictIndices(day){

    pairs.forEach(({a,b})=>{
      const ia=data.indexOf(a),ib=data.indexOf(b);
      if(!conflictPersons[ia])conflictPersons[ia]=new Set();
      if(!conflictPersons[ib])conflictPersons[ib]=new Set();
      conflictPersons[ia].add(person);
      conflictPersons[ib].add(person);
    });
  });
  return conflictPersons;
}

function updateConflictBanner(){
  const conflicts=getConflicts(currentDay);
  const banner=document.getElementById('conflictBanner');
  const list=document.getElementById('conflictList');
  const entries=Object.entries(conflicts).filter(([,pairs])=>pairs.length>0);
  if(!entries.length){banner.style.display='none';return;}
  banner.style.display='block';
  list.innerHTML='';
  entries.forEach(([person,pairs])=>{
    const idx=PEOPLE.indexOf(person);
    pairs.forEach(({a,b})=>{
      const div=document.createElement('div');
      div.className='conflict-item';
      div.innerHTML=`<span class="conflict-dot" style="background:${COLORS[idx]}"></span><span><strong>${person}:</strong> ${a.name} (${fmtTime(a.start)}–${fmtTime(a.end)}) og ${b.name} (${fmtTime(b.start)}–${fmtTime(b.end)}) overlapper</span>`;
      list.appendChild(div);
    });
  });
}

function buildFilters(){
  const c=document.getElementById('pfilters');c.innerHTML='';
  PEOPLE.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='person-btn on';b.dataset.name=p;
    b.style.cssText=`background:${COLORS[i]};border-color:${COLORS[i]};color:#fff;`;
    b.textContent=p;b.onclick=()=>togglePerson(p);c.appendChild(b);
  });
}
function togglePerson(name){
  if(activePersons.has(name))activePersons.delete(name);else activePersons.add(name);
  document.querySelectorAll('.person-btn').forEach(b=>{
    if(b.dataset.name===name){
      const on=activePersons.has(name),idx=PEOPLE.indexOf(name);
      b.classList.toggle('on',on);
      b.style.background=on?COLORS[idx]:'#fff';
      b.style.borderColor=on?COLORS[idx]:'#ccc';
      b.style.color=on?'#fff':'#555';
    }
  });
  render();
}

function setDay(d){
  currentDay=d;
  document.querySelectorAll('.day-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&d==='fri')||(i===1&&d==='sat')));
  if(editorOpen){buildEditorTabs();}
  render();
}

function toggleEditor(){
  editorOpen=!editorOpen;
  document.getElementById('editorWrap').style.display=editorOpen?'block':'none';
  document.getElementById('editToggle').classList.toggle('active',editorOpen);
  if(editorOpen)buildEditorTabs();
}
function buildEditorTabs(){
  const tb=document.getElementById('stageTabs');tb.innerHTML='';
  STAGES.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='est'+(s===editorStage?' active':'');
    if(s===editorStage)b.style.cssText=`background:${STAGE_COLORS[s].hdr};border-color:${STAGE_COLORS[s].hdr};color:#fff;`;
    b.textContent=STAGE_LABELS[i];
    b.onclick=()=>{editorStage=s;buildEditorTabs();};
    tb.appendChild(b);
  });
  buildEditor();
}
function buildEditor(){
  const body=document.getElementById('editorBody');body.innerHTML='';
  const data=DATA[currentDay];
  const conflictPersons=getConflictIndices(currentDay);
  const events=data.filter(e=>e.stage===editorStage).sort((a,b)=>a.start-b.start);
  events.forEach(ev=>{
    const idx=data.indexOf(ev);
    const evConflicts=conflictPersons[idx]||new Set();
    const hasConflict=evConflicts.size>0;
    const row=document.createElement('div');
    row.className='artist-row'+(hasConflict?' conflict-row':'');
    if(hasConflict){
      const ic=document.createElement('span');ic.className='conflict-icon';ic.textContent='⚠';ic.style.color='#E24B4A';row.appendChild(ic);
    }
    const nm=document.createElement('div');nm.className='artist-name';nm.textContent=ev.name;
    const tm=document.createElement('div');tm.className='artist-time';
    tm.textContent=fmtTime(ev.start)+'–'+fmtTime(ev.end);
    row.appendChild(nm);row.appendChild(tm);
    PEOPLE.forEach((p,pi)=>{
      const checked=ev.who.includes(p);
      const isConflict=evConflicts.has(p);
      const btn=document.createElement('div');
      btn.className='person-check'+(checked?' checked':' unchecked')+(isConflict?' conflict-check':'');
      btn.title=p+(isConflict?' (konflikt!)':'');
      btn.style.cssText=`border-color:${COLORS[pi]};background:${checked?COLORS[pi]:'transparent'};color:${checked?'#fff':COLORS[pi]};`;
      btn.onclick=()=>{
        const has=ev.who.includes(p);
        if(has)ev.who=ev.who.filter(x=>x!==p);else ev.who.push(p);
        refreshAll();
        scheduleSave();
      };
      row.appendChild(btn);
    });
    body.appendChild(row);
  });
}

function openPopup(evIdx){
  popupEventIndex=evIdx;
  const ev=DATA[currentDay][evIdx];
  const conflictPersons=getConflictIndices(currentDay);
  const evConflicts=conflictPersons[evIdx]||new Set();
  document.getElementById('popupTitle').textContent=ev.name;
  document.getElementById('popupSub').textContent=STAGE_LABELS[STAGES.indexOf(ev.stage)]+' · '+fmtTime(ev.start)+'–'+fmtTime(ev.end);
  const pc=document.getElementById('popupConflict');
  if(evConflicts.size>0){
    pc.style.display='block';
    pc.textContent='⚠ Konflikt for: '+[...evConflicts].join(', ');
  } else pc.style.display='none';
  const pp=document.getElementById('popupPeople');pp.innerHTML='';
  PEOPLE.forEach((p,pi)=>{
    const checked=ev.who.includes(p);
    const isConflict=evConflicts.has(p);
    const btn=document.createElement('div');
    btn.className='popup-person'+(checked?' checked':' unchecked')+(isConflict?' conflict-person':'');
    btn.style.cssText=`border-color:${COLORS[pi]};background:${checked?COLORS[pi]:'transparent'};color:${checked?'#fff':COLORS[pi]};`;
    btn.textContent=p;
    btn.title=isConflict?p+' har konflikt på dette tidspunkt':'';
    btn.onclick=()=>{
      const has=ev.who.includes(p);
      if(has)ev.who=ev.who.filter(x=>x!==p);else ev.who.push(p);
      refreshAll();
      scheduleSave();
      openPopup(evIdx);
    };
    pp.appendChild(btn);
  });
  document.getElementById('popupOverlay').style.display='flex';
}
function closePopup(e){if(e.target===document.getElementById('popupOverlay'))closePopupDirect();}
function closePopupDirect(){document.getElementById('popupOverlay').style.display='none';popupEventIndex=null;}

document.getElementById('cv').addEventListener('click',function(e){
  const rect=this.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  for(const h of hitBoxes){if(mx>=h.x&&mx<=h.x+h.w&&my>=h.y&&my<=h.y+h.h){openPopup(h.idx);return;}}
});
document.getElementById('cv').style.cursor='pointer';

function refreshAll(){
  updateConflictBanner();
  if(editorOpen)buildEditor();
  render();
}

function buildSegments(person,data,minT,maxT){
  const shows=data.filter(e=>e.who.includes(person)).sort((a,b)=>a.start-b.start);
  const segs=[];let cur=minT;
  for(const s of shows){
    if(s.start>cur+0.04)segs.push({type:'pause',start:cur,end:s.start});
    segs.push({type:'show',start:s.start,end:s.end,stage:s.stage});
    cur=Math.max(cur,s.end);
  }
  if(cur<maxT)segs.push({type:'pause',start:cur,end:maxT});
  return segs;
}
function segCX(seg){return seg.type==='pause'?pauseCX():stageCX(STAGES.indexOf(seg.stage));}

function drawPersonPath(ctx,person,data,minT,maxT,color,offset,conflictTimes){
  const segs=buildSegments(person,data,minT,maxT);
  if(!segs.length)return;
  ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
  for(let i=0;i<segs.length;i++){
    const seg=segs[i];
    const x=segCX(seg)+offset;
    const y1=tY(seg.start,minT),y2=tY(seg.end,minT);
    ctx.globalAlpha=seg.type==='pause'?0.28:0.88;
    ctx.setLineDash(seg.type==='pause'?[4,3]:[]);
    ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x,y2);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
    if(i<segs.length-1){
      const next=segs[i+1],x2=segCX(next)+offset,cy=tY(seg.end,minT);
      if(Math.abs(x2-x)>2){
        ctx.globalAlpha=0.65;ctx.beginPath();ctx.moveTo(x,cy);ctx.lineTo(x2,cy);ctx.stroke();ctx.globalAlpha=1;
      }
    }
  }
  segs.filter(s=>s.type==='show').forEach(seg=>{
    const x=segCX(seg)+offset,y=tY(seg.start,minT);
    const isConflict=conflictTimes&&conflictTimes.some(ct=>Math.abs(ct-seg.start)<0.01||(seg.start<ct&&seg.end>ct+0.01));
    ctx.globalAlpha=1;
    if(isConflict){
      ctx.strokeStyle='#E24B4A';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='#E24B4A';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,1.8,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=color;ctx.lineWidth=2.5;
    } else {
      ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();
    }
  });
}

function wrapText(ctx,text,maxW){
  const words=text.split(' '),lines=[];let line='';
  for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;}
  if(line)lines.push(line);return lines;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function render(){
  const data=DATA[currentDay];
  const minT=currentDay==='fri'?14:11, maxT=24;
  const totalMins=(maxT-minT)*60;
  const canvasH=HDR_H+totalMins*PPM+8, canvasW=totalW();
  const dpr=window.devicePixelRatio||1;
  const cv=document.getElementById('cv');
  cv.width=canvasW*dpr;cv.height=canvasH*dpr;
  cv.style.width=canvasW+'px';cv.style.height=canvasH+'px';
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  const isDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
  const bgColor=isDark?'#1a1a1a':'#ffffff';
  const gridColor=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  const textMuted=isDark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.4)';
  ctx.fillStyle=bgColor;ctx.fillRect(0,0,canvasW,canvasH);
  // Header: live, dj360, pause, viel, bodega
  const headerCols=[
    {x:stageX(0),w:STAGE_W,col:STAGE_COLORS.live,label:STAGE_LABELS[0]},
    {x:stageX(1),w:STAGE_W,col:STAGE_COLORS.dj360,label:STAGE_LABELS[1]},
    {x:pauseX(),w:PAUSE_W,col:STAGE_COLORS.pause,label:'Pause'},
    {x:stageX(2),w:STAGE_W,col:STAGE_COLORS.viel,label:STAGE_LABELS[2]},
    {x:stageX(3),w:STAGE_W,col:STAGE_COLORS.bodega,label:STAGE_LABELS[3]},
  ];
  headerCols.forEach(({x,w,col,label})=>{
    ctx.fillStyle=col.hdr;roundRect(ctx,x,0,w,HDR_H-4,5);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='500 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,x+w/2,HDR_H/2-2,w-6);
  });
  for(let h=minT;h<=maxT;h++){
    const y=tY(h,minT);
    ctx.strokeStyle=gridColor;ctx.lineWidth=0.5;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(TIME_W,y);ctx.lineTo(canvasW,y);ctx.stroke();
    ctx.fillStyle=textMuted;ctx.font='10px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(h<24?h+':00':'00:00',TIME_W-4,y);
  }
  const conflictPersons=getConflictIndices(currentDay);
  hitBoxes=[];
  const stageMap={};STAGES.forEach(s=>stageMap[s]=data.filter(e=>e.stage===s));
  STAGES.forEach((stage,si)=>{
    const x=stageX(si),col=STAGE_COLORS[stage];
    stageMap[stage].forEach(ev=>{
      const evIdx=data.indexOf(ev);
      const y=tY(ev.start,minT)+1;
      const h=Math.max((ev.end-ev.start)*60*PPM-2,14);
      const relevant=ev.who.filter(p=>activePersons.has(p));
      const dim=ev.who.length>0&&!relevant.length;
      const evConflicts=conflictPersons[evIdx]||new Set();
      const hasVisibleConflict=[...evConflicts].some(p=>activePersons.has(p));
      ctx.globalAlpha=dim?0.15:1;
      if(hasVisibleConflict&&!dim){
        ctx.fillStyle='#FCEBEB';roundRect(ctx,x,y,STAGE_W,h,4);ctx.fill();
        ctx.strokeStyle='#E24B4A';ctx.lineWidth=1.5;roundRect(ctx,x,y,STAGE_W,h,4);ctx.stroke();
        ctx.fillStyle='#E24B4A';roundRect(ctx,x,y,3,h,2);ctx.fill();
      } else {
        ctx.fillStyle=col.fill;roundRect(ctx,x,y,STAGE_W,h,4);ctx.fill();
        ctx.strokeStyle=col.stroke;ctx.lineWidth=0.5;roundRect(ctx,x,y,STAGE_W,h,4);ctx.stroke();
      }
      ctx.fillStyle=hasVisibleConflict&&!dim?'#E24B4A':col.text;
      ctx.globalAlpha=dim?0.15:0.3;
      ctx.font='9px sans-serif';ctx.textAlign='right';ctx.textBaseline='top';
      ctx.fillText('✎',x+STAGE_W-3,y+2);
      if(hasVisibleConflict&&!dim){
        ctx.globalAlpha=1;ctx.fillStyle='#E24B4A';
        ctx.font='bold 10px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
        ctx.fillText('⚠',x+5,y+2);
      }
      ctx.globalAlpha=dim?0.15:1;
      ctx.fillStyle=hasVisibleConflict&&!dim?'#A32D2D':col.text;
      ctx.font='500 9px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
      const lines=wrapText(ctx,ev.name,STAGE_W-18);
      const maxL=Math.floor((h-4)/11);
      const textX=hasVisibleConflict&&!dim?x+16:x+4;
      lines.slice(0,Math.max(1,maxL)).forEach((l,li)=>ctx.fillText(l,textX,y+3+li*11,STAGE_W-20));
      ctx.globalAlpha=1;
      hitBoxes.push({x,y,w:STAGE_W,h,idx:evIdx});
    });
  });
  ctx.fillStyle=isDark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.02)';
  ctx.fillRect(pauseX(),HDR_H,PAUSE_W,totalMins*PPM);
  const visiblePersons=PEOPLE.filter(p=>activePersons.has(p));
  const n=visiblePersons.length;
  const maxSpread=Math.min(20,STAGE_W*0.35);
  const conflicts=getConflicts(currentDay);
  visiblePersons.forEach((p,pi)=>{
    const idx=PEOPLE.indexOf(p);
    const offset=n<=1?0:(pi/(n-1)-0.5)*maxSpread*2;
    const personConflicts=conflicts[p]||[];
    const conflictTimes=personConflicts.flatMap(({a,b})=>[a.start,b.start]);
    drawPersonPath(ctx,p,data,minT,maxT,COLORS[idx],offset,conflictTimes);
  });
  updateConflictBanner();
}

buildFilters();
render();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',render);
</script>
</body>
</html>
